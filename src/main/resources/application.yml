spring:
  application:
    name: single-agent-add
  main:
    web-application-type: none
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
      read-timeout: 180000
      chat:
        options:
          model: qwen3-32b
          enable-thinking: false
          temperature: 0.2
          max-tokens: 4096

assignment:
  output-dir: outputs
  dashscope:
    connect-timeout: 30000
